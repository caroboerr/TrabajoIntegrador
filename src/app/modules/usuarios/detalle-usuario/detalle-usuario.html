<div class="contenedor">

  <header class="page-header">
    <h1>Detalle de Usuario</h1>
  </header>

  <section class="card">

    <div class="toolbar">

      <button
        type="button"
        class="btn btn-primary"
        [routerLink]="['/usuarios/alta']">
        ➕ Nuevo Usuario
      </button>

      <button
        type="button"
        class="btn btn-primary"
        (click)="volver()">
        ← Volver a la lista
      </button>

      @if (usuario) {
        <button
          type="button"
          class="btn btn-danger"
          (click)="borrar(usuario.userId)">
          Borrar
        </button>
      }

    </div>

    @if (usuario) {

      <table class="tabla" [class.usuario-inactivo]="!usuario.activo">
        <tbody>

          <tr>
            <th>Username</th>
            <td>{{ usuario.userId }}</td>
          </tr>

          <tr>
            <th>Nombre</th>
            <td>{{ usuario.nombre | uppercase }}</td>
          </tr>

          <tr>
            <th>Email</th>
            <td>{{ usuario.email }}</td>
          </tr>

          <tr>
            <th>Rol</th>
            <td>{{ usuario.rol }}</td>
          </tr>

          <tr>
            <th>Estado</th>

            <td>

              <div class="switch-container">

                <label class="switch">

                  <input
                    type="checkbox"
                    [checked]="usuario.activo"
                    (change)="cambiarEstado($event)">

                  <span class="slider"></span>

                </label>

                @if (usuario.activo) {

                  <span class="estado activo">
                    Activo
                  </span>

                } @else {

                  <span class="estado inactivo">
                    Inactivo
                  </span>

                }

              </div>

            </td>
          </tr>

        </tbody>
      </table>

    } @else {

      <div class="empty-state">
        <p>{{ errorMsg }}</p>
      </div>

    }

  </section>

</div>
